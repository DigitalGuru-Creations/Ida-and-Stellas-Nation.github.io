kind = "web"
previewPath = "/"
title = "Ida & Stella's Nation"
version = "1.0.0"
id = "artifacts/ida-stellas-nation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19744

[services.development]
run = "pnpm --filter @workspace/ida-stellas-nation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ida-stellas-nation", "run", "build" ]
publicDir = "artifacts/ida-stellas-nation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19744"
BASE_PATH = "/"
